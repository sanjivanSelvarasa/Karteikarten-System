services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: karteikarten-backend
    env_file:
      - ./Backend/.env
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
      DB_PATH: DB/karteikarten.db
    ports:
      - "3000:3000"
    volumes:
      - ./DB:/app/DB
    restart: unless-stopped
    networks:
      - karteikarten-network

  frontend:
    image: node:22-alpine
    container_name: karteikarten-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      BACKEND_URL: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - karteikarten-network

networks:
  karteikarten-network:
    driver: bridge
